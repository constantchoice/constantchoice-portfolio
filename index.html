<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Угловые линии - навигация</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/corners.css">
    <link rel="stylesheet" href="css/controls.css">
</head>
<body>
    <div class="pages-container">
        <div class="page page-1 active" id="page1" data-page="1">
            <div class="page-content">
                <h1>01</h1>
                <p>Главная</p>
            </div>
        </div>
        <div class="page page-2" id="page2" data-page="2">
            <div class="page-content">
                <h1>02</h1>
                <p>Проекты</p>
            </div>
        </div>
        <div class="page page-3" id="page3" data-page="3">
            <div class="page-content">
                <h1>03</h1>
                <p>О нас</p>
            </div>
        </div>
        <div class="page page-4" id="page4" data-page="4">
            <div class="page-content">
                <h1>04</h1>
                <p>Контакты</p>
            </div>
        </div>
    </div>

    <!-- Белая подложка для эффекта перехода -->
    <div id="white-mask" class="white-mask"></div>
    <!-- Белая рамка (всегда поверх контента) -->
    <div class="white-frame" id="whiteFrame"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-br"></div>
    <div class="corner corner-bl"></div>
    
    <div class="controls">
        <h3>🎨 Настройки линий</h3>
        
        <h4>📏 Общие параметры</h4>
        
        <div class="control-item">
            <label>📏 Толщина линии (px) <span id="thicknessValue">3</span></label>
            <input type="range" id="thickness" min="1" max="10" value="3" step="0.5">
        </div>
        
        <div class="control-item">
            <label>📍 Отступ от края (px) <span id="offsetValue">20</span></label>
            <input type="range" id="offset" min="5" max="100" value="20" step="1">
        </div>
        
        <div class="control-item">
            <label>🔲 Расстояние между уровнями (px) <span id="spacingValue">15</span></label>
            <input type="range" id="spacing" min="5" max="50" value="15" step="1">
        </div>
        
        <div class="control-item">
            <label>⚪ Радиус скругления (px) <span id="radiusValue">20</span></label>
            <input type="range" id="radius" min="5" max="50" value="20" step="1">
        </div>
        
        <h4>📐 Длина линий по уровням</h4>
        
        <div class="control-item">
            <label><span class="level-badge level-1"></span> Level 1 - по ширине (%) <span id="widthLength1Value">28</span></label>
            <input type="range" id="widthLength1" min="10" max="50" value="28" step="1">
        </div>
        
        <div class="control-item">
            <label><span class="level-badge level-1"></span> Level 1 - по высоте (%) <span id="heightLength1Value">28</span></label>
            <input type="range" id="heightLength1" min="10" max="50" value="28" step="1">
        </div>
        
        <div class="control-item">
            <label><span class="level-badge level-2"></span> Level 2 - по ширине (%) <span id="widthLength2Value">28</span></label>
            <input type="range" id="widthLength2" min="10" max="50" value="28" step="1">
        </div>
        
        <div class="control-item">
            <label><span class="level-badge level-2"></span> Level 2 - по высоте (%) <span id="heightLength2Value">28</span></label>
            <input type="range" id="heightLength2" min="10" max="50" value="28" step="1">
        </div>
        
        <button class="update-btn" id="updateBtn">🔄 Обновить</button>
    </div>
    
    <div class="resolution-info" id="resolutionInfo">Загрузка...</div>

    <!-- JavaScript -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/zones.js"></script>
    <script src="js/LineManager.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
